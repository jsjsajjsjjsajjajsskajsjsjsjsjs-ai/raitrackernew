<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hellodude</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #050505, #000);
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 650px;
    padding: 25px;
    border-radius: 18px;
    background: rgba(10,10,10,0.95);
    border: 1px solid rgba(0,200,255,0.4);
    box-shadow: 0 0 25px rgba(0,200,255,0.25);
    backdrop-filter: blur(10px);
}

/* TOP */
.top {
    display: flex;
    align-items: center;
}

.avatar {
    width: 95px;
    height: 95px;
    border-radius: 50%;
    margin-right: 20px;
    object-fit: cover;
    box-shadow: 0 0 15px rgba(0,200,255,0.5);
}

/* USERNAME */
.username {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

/* BADGE */
.badge {
    margin-top: 10px;
    display: flex;
    align-items: center;
    background: rgba(20,20,20,0.9);
    padding: 6px 12px;
    border-radius: 10px;
    width: fit-content;
    box-shadow: 0 0 10px rgba(0,200,255,0.4);
}

.badge img {
    width: 18px;
    margin-right: 6px;
}

/* TEXT */
.typing {
    margin-top: 25px;
    font-size: 15px;
    color: #ccc;
    height: 20px;
}

/* SOCIALS */
.socials {
    margin-top: 30px;
    display: flex;
    gap: 30px;
}

.socials img {
    width: 34px;
    transition: 0.25s;
    opacity: 0.85;
}

.socials img:hover {
    transform: scale(1.25);
    filter: drop-shadow(0 0 10px #00c3ff);
    opacity: 1;
}

/* VIEWS */
.views {
    margin-top: 20px;
    font-size: 13px;
    color: #aaa;
    background: #111;
    padding: 6px 12px;
    border-radius: 20px;
    width: fit-content;
}

/* AUDIO CONTROLS */
.audio-controls {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
}

button {
    background: #111;
    color: white;
    border: 1px solid #00c3ff;
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    box-shadow: 0 0 10px #00c3ff;
}

input[type=range] {
    width: 120px;
}
</style>
</head>

<body>

<audio id="bgSound" loop>
    <source src="assets/sound.mp3" type="audio/mpeg">
</audio>

<div class="card">

    <div class="top">
        <img src="https://raitracker.xyz/assets/profile.gif" class="avatar">

        <div>
            <div class="username" id="username"></div>

            <div class="badge">
                <img src="https://raitracker.xyz/assets/staff.gif">
                <span>Staff</span>
            </div>
        </div>
    </div>

    <div class="typing" id="typing"></div>

    <div class="socials">
        <a href="https://www.roblox.com/users/2206311896/profile" target="_blank">
            <img src="assets/roblox.png">
        </a>

        <a href=https://discord.com/users/1162435963755180042" target="_blank">
            <img src="assets/discord.png">
        </a>
    </div>

    <div class="views">👁 921,235</div>

    <div class="audio-controls">
        <button onclick="toggleMute()">Mute</button>
        <input type="range" min="0" max="1" step="0.01" value="0.5" onchange="setVolume(this.value)">
    </div>

</div>

<script>
const audio = document.getElementById("bgSound");

/* Start audio on first click */
document.addEventListener("click", () => {
    audio.volume = 0.5;
    audio.play();
}, { once: true });

function toggleMute() {
    audio.muted = !audio.muted;
}

/* Volume */
function setVolume(val) {
    audio.volume = val;
}

/* TYPING */
const usernameText = "Hellodude";
const promoText = "Im just a dude making random things, my fav games is postal and hotline miami, i like rock and rap and i like doing some arts and edits :D";

let uIndex = 0;
let tIndex = 0;
let phase = 0;

const usernameEl = document.getElementById("username");
const typingEl = document.getElementById("typing");

function typeUsername() {
    if (uIndex < usernameText.length) {
        usernameEl.innerHTML += usernameText.charAt(uIndex);
        uIndex++;
        setTimeout(typeUsername, 120);
    } else {
        setTimeout(() => {
            usernameEl.innerHTML = "";
            uIndex = 0;
            typeUsername();
        }, 1800);
    }
}

function typePromo() {
    if (phase === 0) {
        if (tIndex < promoText.length) {
            typingEl.innerHTML += promoText.charAt(tIndex);
            tIndex++;
            setTimeout(typePromo, 50);
        } else {
            phase = 1;
            setTimeout(typePromo, 2000);
        }
    } else {
        typingEl.innerHTML = "";
        tIndex = 0;
        phase = 0;
        setTimeout(typePromo, 500);
    }
}

typeUsername();
typePromo();
</script>

</body>
</html>
